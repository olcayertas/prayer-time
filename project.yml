name: NamazVakti
options:
  bundleIdPrefix: com.olcayertas
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    # Local ad-hoc signing — no Apple Developer account / team required.
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
    DEVELOPMENT_TEAM: ""
    ENABLE_HARDENED_RUNTIME: NO

targets:
  NamazVakti:
    type: application
    platform: macOS
    sources:
      - Sources/App
      - Sources/Core
      - Sources/Shared
    info:
      path: Sources/App/Info.plist
      properties:
        CFBundleDisplayName: Prayer Times
        LSUIElement: true
    entitlements:
      path: Sources/App/NamazVakti.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.olcayertas.NamazVakti
        PRODUCT_NAME: NamazVakti
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: NamazVaktiWidget
        embed: true

  NamazVaktiiOS:
    type: application
    platform: iOS
    sources:
      - Sources/iOS
      - Sources/Core
      - Sources/Shared
      - Sources/LiveActivity/PrayerActivityAttributes.swift
    info:
      path: Sources/iOS/Info.plist
      properties:
        CFBundleDisplayName: Prayer Times
        UILaunchScreen: {}
        NSSupportsLiveActivities: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.olcayertas.NamazVakti.iOS
        PRODUCT_NAME: NamazVaktiiOS
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Real-device signing. Set HERE, not in Xcode — the .xcodeproj is regenerated from
        # this file, so any signing change made in Xcode's UI is wiped on the next `xcodegen`.
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: SNZ29V4PJZ
        CODE_SIGN_IDENTITY: Apple Development
    dependencies:
      - target: NamazVaktiWidgetiOS
        embed: true

  NamazVaktiWidget:
    type: app-extension
    platform: macOS
    sources:
      - Sources/Widget
      - Sources/Core
    info:
      path: Sources/Widget/Info.plist
      properties:
        CFBundleDisplayName: Prayer Times Widget
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: Sources/Widget/NamazVaktiWidget.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.olcayertas.NamazVakti.Widget

  NamazVaktiWidgetiOS:
    type: app-extension
    platform: iOS
    sources:
      # Reuse the cross-platform widget code + its localized name, but NOT the macOS
      # widget's Info.plist / entitlements (which sit in the same folder). Add any new
      # widget .swift files here too.
      - Sources/Widget/NamazVaktiWidget.swift
      - Sources/Widget/InfoPlist.xcstrings
      - Sources/Core
      - Sources/LiveActivity
    info:
      path: Sources/WidgetiOS/Info.plist
      properties:
        CFBundleDisplayName: Prayer Times Widget
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.olcayertas.NamazVakti.iOS.Widget
        # Match the host app's team — an embedded extension signs with the same team.
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: SNZ29V4PJZ
        CODE_SIGN_IDENTITY: Apple Development

  NamazVaktiCoreTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/CoreTests
      - Sources/Core
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.olcayertas.NamazVaktiCoreTests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  NamazVakti:
    build:
      targets:
        NamazVakti: all
        NamazVaktiCoreTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - NamazVaktiCoreTests

  NamazVaktiiOS:
    build:
      targets:
        NamazVaktiiOS: all
    run:
      config: Debug
