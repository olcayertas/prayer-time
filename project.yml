name: NamazVakti
options:
  bundleIdPrefix: com.olcayertas
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.1"
    CURRENT_PROJECT_VERSION: "7"   # 1.0.0 approved + closed; 1.0.1 is the update train (Xcode Cloud manages the actual build number).
    # Local ad-hoc signing — no Apple Developer account / team required.
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
    DEVELOPMENT_TEAM: ""
    ENABLE_HARDENED_RUNTIME: NO
    # Xcode "Update to recommended settings" — pinned here so `xcodegen generate` keeps them
    # (the generated .xcodeproj is gitignored, so accepting them in Xcode's UI is otherwise
    # lost on the next regenerate). Project-level, so every target inherits them.
    DEAD_CODE_STRIPPING: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    CLANG_ANALYZER_LOCALIZABILITY_NONLOCALIZED: YES
    STRING_CATALOG_GENERATE_SYMBOLS: YES

targets:
  NamazVakti:
    type: application
    platform: macOS
    sources:
      - Sources/App
      - Sources/Core
      - Sources/Shared
    info:
      path: Sources/App/Info.plist
      properties:
        CFBundleDisplayName: Prayer Times
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSUIElement: true
        # Arc-theme fonts: bundled .ttf live in Sources/Shared/Fonts/ (already in this target via the
        # Sources/Shared dir); macOS registers every font in the Resources dir.
        ATSApplicationFontsPath: "."
        # Dynamic location (Automatic mode): show prayer times for the user's current city.
        # When-in-use only; a sandboxed agent needs the matching entitlement below.
        NSLocationWhenInUseUsageDescription: "Prayer Times uses your location to show prayer times for where you are."
    entitlements:
      path: Sources/App/NamazVakti.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.personal-information.location: true
        # Shared with the widget so it can read the app's selected district + cached month.
        com.apple.security.application-groups:
          - group.com.olcayertas.NamazVakti
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.olcayertas.NamazVakti
        PRODUCT_NAME: NamazVakti
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # App Groups need provisioning, so sign with the team (overrides the ad-hoc base). CI
        # passes CODE_SIGNING_ALLOWED=NO; the Release DMG overrides to Developer ID on the CLI.
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: SNZ29V4PJZ
        CODE_SIGN_IDENTITY: "Apple Development"
    dependencies:
      - target: NamazVaktiWidget
        embed: true

  NamazVaktiiOS:
    type: application
    platform: iOS
    sources:
      - Sources/iOS
      - Sources/Core
      - Sources/Shared
      - Sources/LiveActivity/PrayerActivityAttributes.swift
    info:
      path: Sources/iOS/Info.plist
      properties:
        CFBundleDisplayName: Prayer Times
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        # Export compliance: the app uses only standard HTTPS (URLSession) — exempt encryption.
        # Declaring this skips the per-upload encryption question in App Store Connect.
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        # Arc-theme bundled fonts (.ttf in Sources/Shared/Fonts/, already in this target via Sources/Shared).
        UIAppFonts:
          - Fraunces.ttf
          - HankenGrotesk.ttf
          - SplineSansMono.ttf
        NSSupportsLiveActivities: true
        # Location serves two features: prayer times for the current city (Automatic mode) and the
        # Qibla compass. When-in-use only (no "always", no precise/temporary upgrade, and no motion
        # key — heading via CoreLocation is gated by location permission, not Motion & Fitness).
        NSLocationWhenInUseUsageDescription: "Prayer Times uses your location to show prayer times for where you are and to point the Qibla compass toward the Kaaba in Mecca."
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    entitlements:
      path: Sources/iOS/NamazVaktiiOS.entitlements
      properties:
        # Shared with the iOS widget so it follows the app's selected district.
        com.apple.security.application-groups:
          - group.com.olcayertas.NamazVakti
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.olcayertas.NamazVakti.iOS
        PRODUCT_NAME: NamazVaktiiOS
        TARGETED_DEVICE_FAMILY: "1"   # iPhone-only for v1.0 (iPad support is a later release)
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Signing set HERE, not in Xcode — the .xcodeproj is regenerated from this file, so any
        # change made in Xcode's UI is wiped on the next `xcodegen`.
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: SNZ29V4PJZ
      configs:
        # Device debug uses a development cert; Release/archive (App Store) signs for distribution.
        Debug:
          CODE_SIGN_IDENTITY: "Apple Development"
        Release:
          CODE_SIGN_IDENTITY: "Apple Distribution"
    dependencies:
      - target: NamazVaktiWidgetiOS
        embed: true

  NamazVaktiWidget:
    type: app-extension
    platform: macOS
    sources:
      - Sources/Widget
      - Sources/Core
    info:
      path: Sources/Widget/Info.plist
      properties:
        CFBundleDisplayName: Prayer Times Widget
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: Sources/Widget/NamazVaktiWidget.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.application-groups:
          - group.com.olcayertas.NamazVakti
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.olcayertas.NamazVakti.Widget
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: SNZ29V4PJZ
        CODE_SIGN_IDENTITY: "Apple Development"

  NamazVaktiWidgetiOS:
    type: app-extension
    platform: iOS
    sources:
      # Reuse the cross-platform widget code + its localized name, but NOT the macOS
      # widget's Info.plist / entitlements (which sit in the same folder). Add any new
      # widget .swift files here too.
      - Sources/Widget/NamazVaktiWidget.swift
      - Sources/Widget/InfoPlist.xcstrings
      - Sources/Core
      - Sources/LiveActivity
    info:
      path: Sources/WidgetiOS/Info.plist
      properties:
        CFBundleDisplayName: Prayer Times Widget
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: Sources/WidgetiOS/NamazVaktiWidgetiOS.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.olcayertas.NamazVakti
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.olcayertas.NamazVakti.iOS.Widget
        TARGETED_DEVICE_FAMILY: "1"   # match the iPhone-only host app
        # Match the host app's team + per-config identity — an embedded extension signs with the
        # same team, and for Release/archive uses the distribution cert.
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: SNZ29V4PJZ
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "Apple Development"
        Release:
          CODE_SIGN_IDENTITY: "Apple Distribution"

  NamazVaktiCoreTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/CoreTests
      - Sources/Core
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.olcayertas.NamazVaktiCoreTests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  NamazVakti:
    build:
      targets:
        NamazVakti: all
        NamazVaktiCoreTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - NamazVaktiCoreTests

  NamazVaktiiOS:
    build:
      targets:
        NamazVaktiiOS: all
    run:
      config: Debug
    archive:
      config: Release
